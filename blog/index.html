---
layout: default
category: blog
pagination_enabled: true
---

<h1>Blog</h1>

{% for post in paginator.posts %}
<div class="post">
  <h3 class="title"><a href="{{ post.url }}">{{ post.title }}</a></h3>
  <p class="date">Date: {{ post.date }}</p>
  <div class="entry">
    {{ post.content }}
  </div>
</div>

{% endfor %}

{{ paginator | pager_links }}
